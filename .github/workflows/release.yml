name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write   # for cosign keyless OIDC signing

jobs:
  # ---------------------------------------------------------------
  # Sign install.sh with cosign + attach to the release.
  #
  # Pre-2026-04 this job also built the `vibed` Go binary in two
  # architectures and uploaded it to the release. vibed is gone now
  # (replaced by the static operator panel on the landing page), so
  # the only release artifact is the signed install.sh itself.
  # ---------------------------------------------------------------
  sign-and-release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.0'

      # SHA256 + cosign keyless signature over install.sh. The signature is
      # verifiable with the canonical OIDC issuer + this repo's identity.
      - name: Hash + sign install.sh
        run: |
          set -euo pipefail
          sha256sum install.sh > install.sh.sha256
          COSIGN_EXPERIMENTAL=1 cosign sign-blob \
              --yes \
              --output-signature install.sh.sig \
              --output-certificate install.sh.crt \
              install.sh

      - name: Generate verification snippet for the release notes
        run: |
          cat > install.sh.verify <<'EOF'
          # Verify install.sh before piping it into bash:
          curl -fsSL https://github.com/KisaesDevLab/vibe-installer/releases/download/${TAG}/install.sh     -o /tmp/install.sh
          curl -fsSL https://github.com/KisaesDevLab/vibe-installer/releases/download/${TAG}/install.sh.sig -o /tmp/install.sh.sig
          curl -fsSL https://github.com/KisaesDevLab/vibe-installer/releases/download/${TAG}/install.sh.crt -o /tmp/install.sh.crt
          cosign verify-blob \
              --certificate /tmp/install.sh.crt \
              --signature   /tmp/install.sh.sig \
              --certificate-identity-regexp '^https://github.com/KisaesDevLab/vibe-installer/' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              /tmp/install.sh
          # If verification succeeds:
          sudo bash /tmp/install.sh
          EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
              install.sh \
              install.sh.sha256 \
              install.sh.sig \
              install.sh.crt \
              --notes-file <(printf '## Verifying install.sh\n\n```bash\n%s\n```\n' "$(sed "s/\${TAG}/$TAG/g" install.sh.verify)")
