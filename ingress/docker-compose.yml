# Caddy ingress — runs only in multi-app mode.
#
# Brought up by `lib/ingress.sh::ingress_up`. Joins the `vibe_ingress`
# external network (created by install.sh); per-app stacks join the same
# network when started with `-f docker-compose.grouped.yml`.
#
# Single ports binding for HTTP and HTTPS. ACME data and certificates
# persist under /var/lib/vibe/ingress/ so a Caddy restart doesn't churn
# Let's Encrypt rate limits.
#
# `cloudflared` sidecar is profile-gated behind `--profile tunnel` and
# only activated by lib/ingress.sh::ingress_compose when vibe.conf has
# tls_mode=cf-tunnel. One tunnel handles every app behind the ingress —
# per-app cloudflared sidecars are no longer used.

services:
  caddy:
    image: caddy:2-alpine
    container_name: vibe-ingress-caddy
    restart: unless-stopped
    ports:
      - '${INGRESS_HTTP_PORT:-80}:80'
      - '${INGRESS_HTTPS_PORT:-443}:443'
    environment:
      VIBE_HOST: '${VIBE_HOST:-vibe.local}'
      TLS_MODE: '${TLS_MODE:-internal}'
      ACME_EMAIL: '${ACME_EMAIL:-}'
    volumes:
      # Caddyfile is rendered by lib/ingress.sh from Caddyfile.template +
      # per-app fragments and bind-mounted in.
      - /etc/vibe/ingress/Caddyfile:/etc/caddy/Caddyfile:ro
      # Static landing page served at https://<host>/ when the operator
      # opens the appliance with no app prefix.
      - ${VIBE_PREFIX:-/opt/vibe-installer}/ingress/landing:/srv/landing:ro
      # ACME state. Caddy stores account keys + issued certs here so a
      # restart picks them up rather than re-issuing.
      - /var/lib/vibe/ingress/data:/data
      - /var/lib/vibe/ingress/config:/config
    networks:
      - vibe_ingress
    healthcheck:
      # Caddy serves HTTPS in every mode now (cf-tunnel uses `tls internal`
      # and lets cloudflared connect with noTLSVerify). --no-check-certificate
      # because `tls internal` produces a self-signed cert outside the
      # container's trust store. The Host header matches the configured
      # site so we hit the /healthz route in Caddyfile.template.
      test: ['CMD-SHELL', 'wget --no-check-certificate -q --header "Host: ${VIBE_HOST:-vibe.local}" -O- https://127.0.0.1/healthz 2>/dev/null | grep -q "ingress: ok"']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # Cloudflare Tunnel sidecar — only activated when vibe.conf has
  # tls_mode=cf-tunnel (lib/ingress.sh::ingress_compose auto-passes
  # `--profile tunnel` in that mode). Routes the public hostname to
  # caddy:443 with noTLSVerify so the Caddyfile stays mode-agnostic.
  #
  # Token comes from /etc/vibe/cloudflared/tunnel.token (stashed by
  # install.sh's intent prompt). The .env file pulls it in via
  # ingress_render_envfile so compose can interpolate ${TUNNEL_TOKEN}
  # without the operator re-pasting on every reload.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: vibe-ingress-cloudflared
    profiles: ['tunnel']
    restart: unless-stopped
    command: ['tunnel', '--no-autoupdate', '--metrics', '0.0.0.0:2000', 'run', '--token', '${TUNNEL_TOKEN:-MISSING_TUNNEL_TOKEN}']
    depends_on:
      caddy:
        condition: service_healthy
    networks:
      - vibe_ingress
    healthcheck:
      # cloudflared exposes a /ready endpoint on its metrics port that returns
      # 200 once the tunnel has at least one healthy connection to a Cloudflare
      # edge. Strictly better than `restart: unless-stopped` alone — a tunnel
      # whose token has been revoked or whose route is misconfigured will run
      # the daemon (Up) without any working connection (Unhealthy).
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:2000/ready 2>/dev/null | grep -q "ConnectorID" || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    mem_limit: 128m
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

networks:
  vibe_ingress:
    external: true
